# =============================================================================
# ALLOWED DOMAINS FOR ENVOY PROXY
# =============================================================================
# This file contains domains that are whitelisted in the Daytona Envoy proxy
#
# IMPORTANT: Wildcards (*.domain.com) only match ONE subdomain level!
#   *.example.com matches: foo.example.com
#   *.example.com does NOT match: bar.foo.example.com

# NPM Registry and Package Managers
npm_registry:
  - registry.npmjs.org
  - registry.npmjs.com
  - nodejs.org
  - nodesource.com
  - npm.pkg.github.com

yarn_packages:
  - yarnpkg.com
  - "*.yarnpkg.com"
  - yarn.npmjs.org
  - yarnpkg.netlify.com

bun:
  - bun.sh
  - "*.bun.sh"

# Git Hosting and Version Control
github:
  - github.com
  - "*.github.com"
  - "*.githubusercontent.com"
  - ghcr.io

gitlab:
  - gitlab.com
  - "*.gitlab.com"

bitbucket:
  - bitbucket.org

azure_devops:
  - dev.azure.com
  - "*.dev.azure.com"
  - login.microsoftonline.com
  - visualstudio.com
  - "*.visualstudio.com"
  - ssh.dev.azure.com
  - vs-ssh.visualstudio.com

# Python Package Managers
pypi:
  - pypi.org
  - pypi.python.org
  - files.pythonhosted.org
  - bootstrap.pypa.io
  - astral.sh

# Rust Package Manager and Toolchain
rust:
  - crates.io
  - static.crates.io
  - index.crates.io
  - static.rust-lang.org
  - rustup.rs
  - doc.rust-lang.org

# Go Module Proxy and Toolchain
golang:
  - proxy.golang.org
  - sum.golang.org
  - index.golang.org
  - go.dev
  - "*.golang.org"
  - storage.googleapis.com

# PHP/Composer Package Manager
composer_packages:
  - packagist.org
  - "*.packagist.org"
  - packagist.com

# Ubuntu/Debian Package Repositories
ubuntu_repos:
  - "*.ubuntu.com"

debian_repos:
  - "*.debian.org"
  - cdn-fastly.deb.debian.org

# CDN and Content Delivery
